<meta name="p:domain_verify" content="2a99bece6bba732ea3af786beaa6f7b1">
<script>
  (function () {
    var hash = window.location.hash || "";
    var isSupabaseAuthHash = hash.indexOf("access_token=") !== -1 || hash.indexOf("refresh_token=") !== -1 || hash.indexOf("error=") !== -1;
    var isWhoTool = window.location.pathname === "/cong-cu/tang-truong-who/";
    if (isSupabaseAuthHash && !isWhoTool) {
      window.location.replace("/cong-cu/tang-truong-who/" + hash);
    }
  })();
</script>
